name: Trigger Documentation Preview Deployment

# Spoke-side workflow that fans out to the documentation hub depending on
# the lifecycle event:
#
#   - PR labeled `deploy-doc-preview` or pushed-to (synchronize) →
#       hub `deploy-preview` dispatch in PREVIEW mode
#       (branch = PR head ref, builds at <DEV>/pr/<N>/).
#
#   - PR merged with that label →
#       hub `deploy-preview` dispatch in MERGE mode
#       (branch = PR base ref, builds the spoke at <DEV>/<spoke>/ and
#       cleans up <DEV>/pr/<N>/).
#
#   - PR closed without merging (still labeled) →
#       hub `close-preview` dispatch (deletes <DEV>/pr/<N>/).
#
# SECURITY WARNING:
# This workflow uses `pull_request` trigger, which means it only works for PRs
# from branches within the same repository (secrets are unavailable for fork PRs).
#
# !!! NEVER CHANGE THIS TO `pull_request_target`!!!
#
# Using `pull_request_target` would create a security issue:
#   1. Attacker opens a legitimate PR from a fork
#   2. Maintainer adds the `deploy-doc-preview` label (trusting the initial code)
#   3. Attacker pushes a malicious commit to their PR branch
#   4. The `synchronize` event triggers this workflow with full secret access
#   5. Workflow dispatches to hub repo with attacker-controlled commit SHA
#   6. Hub repo checks out the malicious SHA from the fork
#   7. Result: Remote Code Execution in the hub's build environment
#
# The current `pull_request` trigger is safe because it runs without secret access,
# preventing the dispatch call from succeeding for fork PRs.
#
# To deploy documentation previews from fork PRs: review and verify the PR code is safe
# and use the manual workflow: .github/workflows/trigger-doc-preview-manual.yml

on:
  pull_request: # NEVER CHANGE THIS TO `pull_request_target`
    types: [labeled, synchronize, closed]

permissions: {} # No permissions by default on workflow level

jobs:
  preview:
    name: Dispatch preview build
    # Trigger on label add, OR on a new commit if the label is already set.
    if: |
      github.event.pull_request.state == 'open' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'deploy-doc-preview') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'deploy-doc-preview'))
      )
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch deploy-preview (preview mode)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          DOC_HUB_REPO: ${{ secrets.DOC_HUB_REPO }}
          SOURCE_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/$DOC_HUB_REPO/dispatches \
            -f event_type='deploy-preview' \
            -f client_payload[source_repo]="$SOURCE_REPO" \
            -f client_payload[pr_number]="$PR_NUMBER" \
            -f client_payload[branch]="$BRANCH" \
            -f client_payload[commit_sha]="$COMMIT_SHA" \
            --silent
          echo "Preview deployment triggered for PR #$PR_NUMBER @ $COMMIT_SHA"

  merge:
    name: Dispatch merge build
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'deploy-doc-preview')
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch deploy-preview (merge mode)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          DOC_HUB_REPO: ${{ secrets.DOC_HUB_REPO }}
          SOURCE_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.base.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          # `merge_commit_sha` is the new commit on the base branch produced
          # by the merge (or squash). Hub validates it against the PR.
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/$DOC_HUB_REPO/dispatches \
            -f event_type='deploy-preview' \
            -f client_payload[source_repo]="$SOURCE_REPO" \
            -f client_payload[pr_number]="$PR_NUMBER" \
            -f client_payload[branch]="$BRANCH" \
            -f client_payload[commit_sha]="$MERGE_SHA" \
            --silent
          echo "Merge deployment triggered for PR #$PR_NUMBER @ $MERGE_SHA on $BRANCH"

  close:
    name: Dispatch preview cleanup
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false &&
      contains(github.event.pull_request.labels.*.name, 'deploy-doc-preview')
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch close-preview
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ secrets.DOC_HUB_REPO }}/dispatches \
            -f event_type='close-preview' \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[pr_number]="${{ github.event.pull_request.number }}" \
            --silent
          echo "Preview cleanup triggered for closed PR #${{ github.event.pull_request.number }}"
