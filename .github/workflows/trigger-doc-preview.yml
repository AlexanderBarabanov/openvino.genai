name: Trigger Documentation Preview Deployment

# Spoke-side workflow that fans out to the documentation hub depending on
# the lifecycle event:
#
#   - PR labeled `deploy-doc-preview` or pushed-to (synchronize) →
#       hub `deploy-preview` dispatch in PREVIEW mode
#       (branch = PR head ref, builds at <DEV>/pr/<N>/).
#
#   - PR merged with that label →
#       hub `deploy-preview` dispatch in MERGE mode
#       (branch = PR base ref, builds the spoke at <DEV>/<spoke>/ and
#       cleans up <DEV>/pr/<N>/).
#
#   - PR closed without merging (still labeled) →
#       hub `close-preview` dispatch (deletes <DEV>/pr/<N>/).

on:
  pull_request:
    types: [labeled, synchronize, closed]

permissions: {} # No permissions by default on workflow level

jobs:
  preview:
    name: Dispatch preview build
    # Trigger on label add, OR on a new commit if the label is already set.
    if: |
      github.event.pull_request.state == 'open' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'deploy-doc-preview') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'deploy-doc-preview'))
      )
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch deploy-preview (preview mode)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ secrets.DOC_HUB_REPO }}/dispatches \
            -f event_type='deploy-preview' \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[pr_number]="${{ github.event.pull_request.number }}" \
            -f client_payload[branch]="${{ github.event.pull_request.head.ref }}" \
            -f client_payload[commit_sha]="${{ github.event.pull_request.head.sha }}" \
            --silent
          echo "Preview deployment triggered for PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"

  merge:
    name: Dispatch merge build
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'deploy-doc-preview')
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch deploy-preview (merge mode)
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # `merge_commit_sha` is the new commit on the base branch produced
          # by the merge (or squash). Hub validates it against the PR.
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ secrets.DOC_HUB_REPO }}/dispatches \
            -f event_type='deploy-preview' \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[pr_number]="${{ github.event.pull_request.number }}" \
            -f client_payload[branch]="${{ github.event.pull_request.base.ref }}" \
            -f client_payload[commit_sha]="$MERGE_SHA" \
            --silent
          echo "Merge deployment triggered for PR #${{ github.event.pull_request.number }} @ $MERGE_SHA on ${{ github.event.pull_request.base.ref }}"

  close:
    name: Dispatch preview cleanup
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false &&
      contains(github.event.pull_request.labels.*.name, 'deploy-doc-preview')
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch close-preview
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ secrets.DOC_HUB_REPO }}/dispatches \
            -f event_type='close-preview' \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[pr_number]="${{ github.event.pull_request.number }}" \
            --silent
          echo "Preview cleanup triggered for closed PR #${{ github.event.pull_request.number }}"
