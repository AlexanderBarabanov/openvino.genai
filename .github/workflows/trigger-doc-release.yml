name: Trigger Documentation Release

# Spoke-side workflow that dispatches a release build to the documentation
# hub when a `vMAJOR.MINOR.PATCH` tag is pushed.
#
# The hub (Publish Documentation (Release)) builds this spoke at the
# tagged commit, derives the minor prefix vX.Y, and uploads to
# <PROD>/<spoke>/vX.Y/. Patch releases overwrite the same minor prefix.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

jobs:
  release:
    name: Dispatch publish-release
    runs-on: ubuntu-latest
    environment:
      name: preview-doc
      deployment: false
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}
          owner: AlexanderBarabanov
          repositories: edge-manage-docs

      - name: Dispatch publish-release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          # github.ref looks like refs/tags/v1.2.3
          TAG: ${{ github.ref_name }}
          # For an annotated tag, github.sha is the tagged commit (the
          # tag object itself is dereferenced by the runner).
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ secrets.DOC_HUB_REPO }}/dispatches \
            -f event_type='publish-release' \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[tag]="$TAG" \
            -f client_payload[commit_sha]="$COMMIT_SHA" \
            --silent
          echo "Release dispatch sent: $TAG @ $COMMIT_SHA"
